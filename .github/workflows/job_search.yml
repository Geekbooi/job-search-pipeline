name: Job Search Pipeline

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:           # manual trigger

permissions:
  contents: write              # needed to commit seen_jobs.json back

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_USER:        ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_HOST:   ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT:   ${{ secrets.EMAIL_SMTP_PORT }}
          RAPIDAPI_KEY:      ${{ secrets.RAPIDAPI_KEY }}
        run: python src/main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
